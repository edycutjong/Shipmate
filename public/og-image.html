<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipmate OG Image Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Fixed 1200x630 dimension for standard OpenGraph and Twitter cards */
    .og-container {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      position: relative;
    }
    
    /* Smooth mesh gradients */
    .mesh-bg {
      background-color: #0f172a;
      background-image: 
        radial-gradient(ellipse at 10% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
    }

    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

  <div class="og-container mesh-bg flex flex-col justify-center items-center text-white" id="og-target">
    
    <!-- Floating particles/stars (Fake visual flair) -->
    <div class="absolute top-20 left-32 w-2 h-2 bg-cyan-400 rounded-full opacity-50 shadow-[0_0_10px_#22d3ee]"></div>
    <div class="absolute bottom-32 right-32 w-3 h-3 bg-violet-400 rounded-full opacity-30 shadow-[0_0_15px_#a855f7]"></div>
    <div class="absolute top-1/2 left-20 w-1.5 h-1.5 bg-slate-300 rounded-full opacity-40"></div>

    <div class="glass-card rounded-3xl p-16 w-5/6 max-w-[1000px] flex flex-col items-center relative overflow-hidden">
      <!-- Glow behind the center text -->
      <div class="absolute inset-0 bg-gradient-to-tr from-cyan-500/10 to-violet-500/10 opacity-50 blur-2xl"></div>

      <!-- Icon / Logo -->
      <div class="w-24 h-24 rounded-2xl bg-slate-800/80 border border-slate-700 shadow-xl flex items-center justify-center mb-10 z-10">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
          <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
        </svg>
      </div>

      <!-- Text Content -->
      <div class="text-center z-10">
        <h1 class="text-7xl font-extrabold tracking-tight mb-6">
          <span class="text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-400">Ship</span><span class="text-transparent bg-clip-text bg-gradient-to-br from-cyan-400 to-violet-500">mate</span>
        </h1>
        <p class="text-3xl text-slate-300 font-medium leading-relaxed max-w-2xl mx-auto">
          From Prompt to Product<br>
          <span class="text-slate-400">Automated Marketing Engine</span>
        </p>
      </div>

      <!-- Feature badges -->
      <div class="flex gap-6 mt-12 z-10 w-full justify-center">
        <div class="flex items-center px-5 py-3 rounded-full bg-slate-800/50 border border-slate-700/50">
          <svg class="w-5 h-5 text-cyan-400 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
          <span class="text-slate-200 text-lg font-semibold">Landing Page</span>
        </div>
        <div class="flex items-center px-5 py-3 rounded-full bg-slate-800/50 border border-slate-700/50">
          <svg class="w-5 h-5 text-[#ff6154] mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2z"/></svg>
          <span class="text-slate-200 text-lg font-semibold">Product Hunt</span>
        </div>
        <div class="flex items-center px-5 py-3 rounded-full bg-slate-800/50 border border-slate-700/50">
          <svg class="w-5 h-5 text-[#1da1f2] mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>
          <span class="text-slate-200 text-lg font-semibold">Twitter Thread</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
